server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve frontend SPA — all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api to Laravel backend (no hardcoded host in frontend)
    location /api/ {
        proxy_pass http://backend:10000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy /storage to backend
    location /storage/ {
        proxy_pass http://backend:10000;
    }

    # Proxy WebSocket (Reverb) — relative URL, no hardcoded port
    location /app/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
