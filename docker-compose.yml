version: '3.9'

services:

  db:
    image: mysql:8.0
    container_name: noteapp_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE:      noteapp
      MYSQL_USER:          noteapp
      MYSQL_PASSWORD:      noteapp
    volumes:
      - db_data:/var/lib/mysql
    networks: [noteapp]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: noteapp_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks: [noteapp]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: noteapp_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on: [backend]
    networks: [noteapp]

volumes:
  db_data:

networks:
  noteapp:
    driver: bridge
